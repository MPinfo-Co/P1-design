openapi: "3.0.3"
info:
  title: Structure Validation API
  version: "1.0.0"
  description: Issue body 結構優化驗證用 API Spec

paths:
  /api/ping:
    get:
      summary: 連線測試
      operationId: getPing
      responses:
        "200":
          description: 連線正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  pong:
                    type: boolean
                    example: true

  /api/version:
    get:
      summary: 取得版本資訊
      operationId: getVersion
      responses:
        "200":
          description: 成功取得版本
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "1.0.0"
                  env:
                    type: string
                    example: production
