name: SA to SD

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-sd-issue:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'sa-')
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create SD Issue + D-Branch, update Epic
        id: create-sd
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = 'MPinfo-Co';
            const designRepo = 'P1-design';
            const projectRepo = 'P1-project';

            const branchName = context.payload.pull_request.head.ref;

            // 從 branch 名稱取 SA Issue 編號
            const match = branchName.match(/^sa-(\d+)-/);
            if (!match) {
              console.log(`Branch ${branchName} 不符合 sa-N-xxx 格式，跳過`);
              return;
            }
            const saNumber = parseInt(match[1]);

            // 讀取 SA Issue（在 P1-design）
            const saIssue = await github.rest.issues.get({
              owner: org,
              repo: designRepo,
              issue_number: saNumber,
            });

            const saBody = saIssue.data.body || '';
            const epicMatch = saBody.match(/Epic：(?:MPinfo-Co\/P1-project#|P1-project #)(\d+)/);
            if (!epicMatch) {
              console.log(`SA Issue #${saNumber} body 找不到 Epic 編號，跳過`);
              return;
            }
            const epicNumber = parseInt(epicMatch[1]);

            // 從 Epic Issue 取乾淨標題（去除 [PM] 前綴）
            const epicIssue = await github.rest.issues.get({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
            });
            const epicTitle = epicIssue.data.title.replace(/^\[PM\]\s*/i, '');

            // 產生 SD branch slug
            const slug = epicTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'issue';

            // 在 P1-design 建立 SD Issue
            const sdIssue = await github.rest.issues.create({
              owner: org,
              repo: designRepo,
              title: `[SD] ${epicTitle}`,
              body: [
                '## 關聯項目',
                '',
                '### SD 工作文件',
                `- sa-${saNumber}-logic.md：[SA/sa-${saNumber}-logic.md](https://github.com/${org}/${designRepo}/blob/main/SA/sa-${saNumber}-logic.md)`,
                `- TDD：（待填入）`,
                '',
                '### 關聯 Issue',
                `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
                `- SA Issue：MPinfo-Co/P1-design#${saNumber}`,
                `- SD Issue：#（本 Issue）`,
                `- PG Issue：P1-code #（merge 後自動填入）`,
                '',
                '### 相關連結',
                `- 分支：（待填入）`,
                `- Draft PR：（待建立）`,
              ].join('\n'),
              labels: ['SD'],
            });

            const sdNumber = sdIssue.data.number;

            // 將 SD Issue 掛為 Epic 的 sub-issue
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                owner: org,
                repo: projectRepo,
                issue_number: epicNumber,
                sub_issue_id: sdIssue.data.id,
              });
            } catch (e) {
              console.log(`Sub-issue 關聯建立失敗（非阻斷性）：${e.message}`);
            }

            const dBranchName = `sd-${sdNumber}-${slug}`;

            // 取得 P1-design main SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: designRepo,
              ref: 'heads/main',
            });

            // 建立 SD Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: designRepo,
                ref: `refs/heads/${dBranchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // Scaffold TDD 檔案
            const tddContent = [
              `# TDD：[SD] ${epicTitle}`,
              '',
              '## 工作項目',
              '| # | 類型 | 工作內容 | 參照規格 |',
              '|---|------|--------|--------|',
              '',
              '## 測試案例',
              '| ID | 類型 | 前置條件 | 操作 | 預期結果 |',
              '|----|------|--------|------|--------|',
              '',
            ].join('\n');

            const tddTree = await github.rest.git.createTree({
              owner: org,
              repo: designRepo,
              base_tree: mainRef.data.object.sha,
              tree: [
                {
                  path: `SD/sd-${sdNumber}-TDD.md`,
                  mode: '100644',
                  type: 'blob',
                  content: tddContent,
                },
              ],
            });

            const tddCommit = await github.rest.git.createCommit({
              owner: org,
              repo: designRepo,
              message: `chore(sd-${sdNumber}): scaffold TDD 檔案`,
              tree: tddTree.data.sha,
              parents: [mainRef.data.object.sha],
            });

            await github.rest.git.updateRef({
              owner: org,
              repo: designRepo,
              ref: `heads/${dBranchName}`,
              sha: tddCommit.data.sha,
            });

            // 建立 SD Draft PR
            let sdPrNumber = null;
            let sdPrUrl = null;
            try {
              const sdPr = await github.rest.pulls.create({
                owner: org,
                repo: designRepo,
                head: dBranchName,
                base: 'main',
                draft: true,
                title: `[SD] ${epicTitle}`,
                body: `Closes #${sdNumber}`,
              });
              sdPrNumber = sdPr.data.number;
              sdPrUrl = sdPr.data.html_url;
            } catch (e) {
              console.log(`SD Draft PR 建立失敗（非阻斷性）：${e.message}`);
            }

            // 回填 SD Issue body
            await github.rest.issues.update({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
              body: sdIssue.data.body
                .replace('SD Issue：#（本 Issue）', `SD Issue：#${sdNumber}`)
                .replace('分支：（待填入）', `分支：[${dBranchName}](https://github.com/${org}/${designRepo}/tree/${dBranchName})`)
                .replace('Draft PR：（待建立）', sdPrUrl ? `Draft PR：[#${sdPrNumber}](${sdPrUrl})` : 'Draft PR：（未建立）')
                .replace('TDD：（待填入）', `TDD：[SD/sd-${sdNumber}-TDD.md](https://github.com/${org}/${designRepo}/blob/${dBranchName}/SD/sd-${sdNumber}-TDD.md)`),
            });

            // 回填 SA Issue body：SD Issue 編號 + branch ref → main
            await github.rest.issues.update({
              owner: org,
              repo: designRepo,
              issue_number: saNumber,
              body: saIssue.data.body
                .replace(/SD Issue：P1-design #（merge 後自動填入）/, `SD Issue：MPinfo-Co/P1-design#${sdNumber}`)
                .replace(new RegExp(`/blob/${branchName}/`, 'g'), '/blob/main/'),
            });

            // 在 SA Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: designRepo,
              issue_number: saNumber,
              body: [
                `✅ **SA 分析完成，SD Issue 已自動建立**`,
                `- Issue：[P1-design #${sdNumber}](https://github.com/${org}/${designRepo}/issues/${sdNumber})`,
                `- 分支：\`${dBranchName}\``,
                ``,
                `SD 請至 P1-design 開始系統設計。`,
              ].join('\n'),
            });

            // 在 Epic Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
              body: `📐 SA 分析完成，SD Issue 已建立：[P1-design #${sdNumber}](https://github.com/${org}/${designRepo}/issues/${sdNumber})`,
            });

            // 關閉 SA Issue
            await github.rest.issues.update({
              owner: org,
              repo: designRepo,
              issue_number: saNumber,
              state: 'closed',
              state_reason: 'completed',
            });

            core.setOutput('sd_number', String(sdNumber));
            core.setOutput('sa_number', String(saNumber));
            core.setOutput('branch', dBranchName);

      - name: Checkout P1-design SD branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.create-sd.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout P1-project
        uses: actions/checkout@v4
        with:
          repository: MPinfo-Co/P1-project
          path: P1-project
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Build SD prompt
        run: |
          SD_NUMBER="${{ steps.create-sd.outputs.sd_number }}"
          SA_NUMBER="${{ steps.create-sd.outputs.sa_number }}"
          sed "s/ISSUE_NUMBER/${SD_NUMBER}/g; s/SA_NUMBER/${SA_NUMBER}/g" \
            prompts/sd-writer-prompt.md > /tmp/sd-prompt.txt
          echo "Prompt built for SD #$SD_NUMBER (SA #$SA_NUMBER)"

      - name: Run SD Worker Agent
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude --dangerously-skip-permissions --print < /tmp/sd-prompt.txt

      - name: Commit TDD
        run: |
          SD_NUMBER="${{ steps.create-sd.outputs.sd_number }}"
          BRANCH="${{ steps.create-sd.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "SD/sd-${SD_NUMBER}-TDD.md"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(sd-${SD_NUMBER}): SD 產出 TDD"
          git push origin "$BRANCH"

      - name: Post comment to SD issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issueNumber = parseInt('${{ steps.create-sd.outputs.sd_number }}');
            const branch = '${{ steps.create-sd.outputs.branch }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '🤖 TDD 已自動產出，請至 branch 確認：',
                `- 檔案：\`SD/sd-${issueNumber}-TDD.md\``,
                `- Branch：\`${branch}\``,
                '',
                '確認無誤後請 merge。',
              ].join('\n'),
            });
