name: A-Agent-Workflow

on:
  push:
    branches:
      - 'sa-*'

permissions:
  contents: write
  issues: write

jobs:
  sa-worker:
    # 只在 p-workflow scaffold SA 分析文件時觸發
    if: contains(github.event.head_commit.message, 'scaffold SA 分析文件')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SA branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract issue number from branch name
        id: branch-info
        run: |
          BRANCH="${{ github.ref_name }}"
          ISSUE_NUMBER=$(echo "$BRANCH" | sed 's/^sa-\([0-9]*\).*/\1/')
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Cannot parse issue number from branch: $BRANCH"
            exit 1
          fi
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "SA Issue #$ISSUE_NUMBER, Branch: $BRANCH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      - name: Build prompt with issue number
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          sed "s/ISSUE_NUMBER/${ISSUE_NUMBER}/g" .github/prompts/sa-worker.md > /tmp/sa-prompt.txt
          echo "Prompt built for SA #$ISSUE_NUMBER"
          cat /tmp/sa-prompt.txt

      - name: Run SA Worker Agent
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions --print < /tmp/sa-prompt.txt

      - name: Commit SA 分析文件
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          BRANCH="${{ steps.branch-info.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "SA/sa-${ISSUE_NUMBER}-logic.md"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(sa-${ISSUE_NUMBER}): SA 產出 SA 分析文件"
          git push origin "$BRANCH"

      - name: Post comment to SA issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.branch-info.outputs.issue_number }}');
            const branch = '${{ steps.branch-info.outputs.branch }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '🤖 SA 分析文件已自動產出，請至 branch 確認：',
                `- 檔案：\`SA/sa-${issueNumber}-logic.md\``,
                `- Branch：\`${branch}\``,
                '',
                '確認無誤後請 merge。',
              ].join('\n'),
            });
