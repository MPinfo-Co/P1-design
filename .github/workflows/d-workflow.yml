# 規格說明：https://github.com/MPinfo-Co/P1-project/blob/main/docs/github-workflow/d-workflow.md
name: D-workflow

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-pg-issue:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'issue-')
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PG Issue + C-Branch, update Epic
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = 'MPinfo-Co';
            const designRepo = 'P1-design';
            const codeRepo = 'P1-code';
            const projectRepo = 'P1-project';
            const analysisRepo = 'P1-analysis';

            const branchName = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;

            // 從 branch 名稱取 SD Issue 編號
            const match = branchName.match(/^issue-(\d+)-/);
            if (!match) {
              console.log(`Branch ${branchName} 不符合格式，跳過`);
              return;
            }
            const sdNumber = parseInt(match[1]);

            // 讀取 SD Issue，取得 Epic + SA 編號
            const sdIssue = await github.rest.issues.get({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
            });

            const sdBody = sdIssue.data.body || '';
            const epicMatch = sdBody.match(/Epic：(?:MPinfo-Co\/P1-project#|P1-project #)(\d+)/);
            const saMatch = sdBody.match(/SA Issue：(?:MPinfo-Co\/P1-analysis#|P1-analysis #)(\d+)/);

            if (!epicMatch) {
              console.log(`SD Issue #${sdNumber} body 找不到 Epic 編號，跳過`);
              return;
            }

            const epicNumber = parseInt(epicMatch[1]);
            const saNumber = saMatch ? parseInt(saMatch[1]) : null;

            // 從 Epic Issue 取乾淨標題（去除 [PM] 前綴）
            const epicIssueData = await github.rest.issues.get({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
            });
            const epicTitle = epicIssueData.data.title.replace(/^\[PM\]\s*/i, '');

            // 取得 PR diff，找出異動的 Spec/Prototype 檔案
            const files = await github.rest.pulls.listFiles({
              owner: org,
              repo: designRepo,
              pull_number: prNumber,
            });

            const changedSpecs = files.data
              .map(f => f.filename)
              .filter(f => f.startsWith('schema/') || f.startsWith('Prototype/') || f.startsWith('Spec/'))
              .map(f => `- [${f}](https://github.com/${org}/${designRepo}/blob/main/${f})`)
              .join('\n') || '- （本次無 schema/Prototype/Spec 異動）';

            // 產生 C-Branch slug
            const slug = epicTitle
              .toLowerCase()
              .trim()
              .replace(/['"]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .slice(0, 50) || 'issue';

            // 在 P1-code 建立 PG Issue
            const pgIssue = await github.rest.issues.create({
              owner: org,
              repo: codeRepo,
              title: `[PG] ${epicTitle}`,
              body: [
                '## 實作範圍',
                '<!-- 本次 SD 異動的 Spec/Prototype 清單，由系統自動填入 -->',
                '',
                changedSpecs,
                '',
                '## 測試執行紀錄',
                '',
                '| 案例 ID | 結果 | 備註 |',
                '|---------|------|------|',
                '',
                '## 關聯項目',
                '',
                '### 工作狀態',
                `- 階段：PG`,
                `- 分支：（待填入）`,
                `- Draft PR：（待建立）`,
                '',
                '### 關聯 Issue',
                `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
                saNumber ? `- SA Issue：MPinfo-Co/P1-analysis#${saNumber}` : `- SA Issue：（請查 Epic）`,
                `- SD Issue：MPinfo-Co/P1-design#${sdNumber}`,
                `- PG Issue：#（本 Issue）`,
                '',
                '### 關聯檔案',
                saNumber ? `- business-logic.md：[issue-${saNumber}/business-logic.md](https://github.com/${org}/${analysisRepo}/blob/main/issue-${saNumber}/business-logic.md)` : `- business-logic.md：（請查 Epic）`,
                `- SpecDiff：[SpecDiff/issue-${sdNumber}.md](https://github.com/${org}/${designRepo}/blob/main/SpecDiff/issue-${sdNumber}.md)`,
                `- TestPlan：[TestPlan/issue-${sdNumber}.md](https://github.com/${org}/${designRepo}/blob/main/TestPlan/issue-${sdNumber}.md)`,
                `- TestReport：[TestReport/issue-${sdNumber}.md](https://github.com/${org}/${codeRepo}/blob/${cBranchName}/TestReport/issue-${sdNumber}.md)`,
              ].join('\n'),
              labels: ['PG'],
            });

            const pgNumber = pgIssue.data.number;

            // 將 PG Issue 掛為 Epic 的 sub-issue
            try {
              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                owner: org,
                repo: projectRepo,
                issue_number: epicNumber,
                sub_issue_id: pgIssue.data.id,
              });
            } catch (e) {
              console.log(`Sub-issue 關聯建立失敗（非阻斷性）：${e.message}`);
            }

            const cBranchName = `issue-${pgNumber}-${slug}`;

            // ← backfill 移到 Draft PR 建立後，見下方

            // 取得 P1-code main SHA
            const mainRef = await github.rest.git.getRef({
              owner: org,
              repo: codeRepo,
              ref: 'heads/main',
            });

            // 建立 C-Branch
            try {
              await github.rest.git.createRef({
                owner: org,
                repo: codeRepo,
                ref: `refs/heads/${cBranchName}`,
                sha: mainRef.data.object.sha,
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            // 讀取 TestPlan，產生 TestReport scaffold（同時提供 C-Branch 初始 commit，讓 Draft PR 可建立）
            let testPlanRaw = '';
            try {
              const testPlanFile = await github.rest.repos.getContent({
                owner: org,
                repo: designRepo,
                path: `TestPlan/issue-${sdNumber}.md`,
                ref: 'main',
              });
              testPlanRaw = Buffer.from(testPlanFile.data.content, 'base64').toString('utf8');
            } catch (e) {
              console.log(`找不到 TestPlan/issue-${sdNumber}.md，使用空表格`);
            }

            const testReportContent = testPlanRaw
              ? testPlanRaw
                  .split('\n')
                  .map(line => {
                    if (line.startsWith('# TestPlan：')) return line.replace('# TestPlan：', '# TestReport：');
                    if (/^\|[\s\-:]+(\|[\s\-:]+)*\|$/.test(line)) return line.replace(/\|$/, '| --- | --- |');
                    if (line.startsWith('|') && line.endsWith('|')) return line.replace(/\|$/, '|  |  |');
                    return line;
                  })
                  .join('\n')
              : [
                  `# TestReport：issue-${sdNumber} [PG] ${epicTitle}`,
                  '',
                  '## 測試案例',
                  '| ID | 類型 | 前置條件 | 操作 | 預期結果 | 結果 | 備註 |',
                  '|----|------|---------|------|---------|------|------|',
                  '',
                ].join('\n');

            const pgScaffoldTree = await github.rest.git.createTree({
              owner: org,
              repo: codeRepo,
              base_tree: mainRef.data.object.sha,
              tree: [
                {
                  path: `TestReport/issue-${sdNumber}.md`,
                  mode: '100644',
                  type: 'blob',
                  content: testReportContent,
                },
              ],
            });

            const pgScaffoldCommit = await github.rest.git.createCommit({
              owner: org,
              repo: codeRepo,
              message: `chore(issue-${pgNumber}): scaffold TestReport 檔案`,
              tree: pgScaffoldTree.data.sha,
              parents: [mainRef.data.object.sha],
            });

            await github.rest.git.updateRef({
              owner: org,
              repo: codeRepo,
              ref: `heads/${cBranchName}`,
              sha: pgScaffoldCommit.data.sha,
            });

            // 建立 PG Draft PR
            let pgPrNumber = null;
            let pgPrUrl = null;
            try {
              const pgPr = await github.rest.pulls.create({
                owner: org,
                repo: codeRepo,
                head: cBranchName,
                base: 'main',
                draft: true,
                title: `[PG] ${epicTitle}`,
                body: `Closes #${pgNumber}`,
              });
              pgPrNumber = pgPr.data.number;
              pgPrUrl = pgPr.data.html_url;
            } catch (e) {
              console.log(`PG Draft PR 建立失敗（非阻斷性）：${e.message}`);
            }

            // 回填 PG Issue body：編號 + 分支連結 + Draft PR 連結
            await github.rest.issues.update({
              owner: org,
              repo: codeRepo,
              issue_number: pgNumber,
              body: pgIssue.data.body
                .replace('PG Issue：#（本 Issue）', `PG Issue：#${pgNumber}`)
                .replace('分支：（待填入）', `分支：[${cBranchName}](https://github.com/${org}/${codeRepo}/tree/${cBranchName})`)
                .replace('Draft PR：（待建立）', pgPrUrl ? `Draft PR：[#${pgPrNumber}](${pgPrUrl})` : 'Draft PR：（未建立）'),
            });

            // 更新 Epic Issue body
            const epicIssue = await github.rest.issues.get({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
            });

            const updatedEpicBody = (epicIssue.data.body || '')
              .replace(
                /- PG Issue：P1-code #（待建立）/,
                `- PG Issue：MPinfo-Co/P1-code#${pgNumber}`
              );

            await github.rest.issues.update({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
              body: updatedEpicBody,
            });

            // 回填 SD Issue body：PG Issue 編號 + branch ref → main
            await github.rest.issues.update({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
              body: sdIssue.data.body
                .replace(/PG Issue：P1-code #（merge 後自動填入）/, `PG Issue：MPinfo-Co/P1-code#${pgNumber}`)
                .replace(/\/blob\/issue-\d+-[^\/]+\//g, '/blob/main/'),
            });

            // 在 SD Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
              body: [
                `✅ **SD 設計完成，PG Issue 已自動建立**`,
                `- Issue：[P1-code #${pgNumber}](https://github.com/${org}/${codeRepo}/issues/${pgNumber})`,
                `- 分支：\`${cBranchName}\``,
                `- 本次異動規格：`,
                changedSpecs,
                ``,
                `PG／AI 請至 P1-code 開始系統開發。`,
              ].join('\n'),
            });

            // 在 Epic Issue 留言
            await github.rest.issues.createComment({
              owner: org,
              repo: projectRepo,
              issue_number: epicNumber,
              body: `💻 SD 設計完成，PG Issue 已建立：[P1-code #${pgNumber}](https://github.com/${org}/${codeRepo}/issues/${pgNumber})`,
            });

            // 關閉 SD Issue
            await github.rest.issues.update({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Generate SpecDiff
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const org = 'MPinfo-Co';
            const designRepo = 'P1-design';
            const projectRepo = 'P1-project';
            const analysisRepo = 'P1-analysis';

            const branchName = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const baseSha = context.payload.pull_request.base.sha;

            const match = branchName.match(/^issue-(\d+)-/);
            if (!match) {
              console.log(`Branch ${branchName} 不符合格式，跳過`);
              return;
            }
            const sdNumber = parseInt(match[1]);

            const sdIssue = await github.rest.issues.get({
              owner: org,
              repo: designRepo,
              issue_number: sdNumber,
            });

            const sdBody = sdIssue.data.body || '';
            const epicMatch = sdBody.match(/Epic：(?:MPinfo-Co\/P1-project#|P1-project #)(\d+)/);
            const saMatch = sdBody.match(/SA Issue：(?:MPinfo-Co\/P1-analysis#|P1-analysis #)(\d+)/);

            if (!epicMatch) {
              console.log(`SD Issue #${sdNumber} body 找不到 Epic 編號，跳過`);
              return;
            }

            const epicNumber = parseInt(epicMatch[1]);
            const saNumber = saMatch ? parseInt(saMatch[1]) : null;
            const epicTitle = sdIssue.data.title.replace(/^(\[[^\]]+\]\s*)+/, '');

            const files = await github.rest.pulls.listFiles({
              owner: org,
              repo: designRepo,
              pull_number: prNumber,
            });

            const changedFiles = files.data
              .filter(f => f.filename.startsWith('schema/') || f.filename.startsWith('Prototype/') || f.filename.startsWith('Spec/'));

            const changedSpecs = changedFiles.length > 0
              ? changedFiles.map(f => {
                  const lines = [`- **${f.filename}**（${f.status}，+${f.additions} -${f.deletions}）`];
                  if (f.patch) {
                    lines.push('```diff');
                    lines.push(f.patch);
                    lines.push('```');
                  }
                  return lines.join('\n');
                }).join('\n\n')
              : '- （本次無 schema/Prototype/Spec 異動）';

            const content = [
              `# SpecDiff：Issue #${sdNumber} ${epicTitle}`,
              '',
              '## 修改項目及內容',
              changedSpecs,
              '',
              '## 關聯項目',
              `- Epic：MPinfo-Co/P1-project#${epicNumber}`,
              saNumber ? `- SA Issue：MPinfo-Co/P1-analysis#${saNumber}` : `- SA Issue：P1-analysis #（請查 Epic）`,
              `- SD Issue：P1-design #${sdNumber}`,
              `- 上一個 commit：${baseSha.slice(0, 7)}`,
              `- 本次 commit：${headSha.slice(0, 7)}`,
            ].join('\n');

            const filePath = `SpecDiff/issue-${sdNumber}.md`;
            const encodedContent = Buffer.from(content, 'utf8').toString('base64');

            let fileSha = undefined;
            try {
              const existing = await github.rest.repos.getContent({
                owner: org,
                repo: designRepo,
                path: filePath,
              });
              fileSha = existing.data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: org,
              repo: designRepo,
              path: filePath,
              message: `chore: auto-generate SpecDiff for issue-${sdNumber}`,
              content: encodedContent,
              ...(fileSha ? { sha: fileSha } : {}),
              author: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
            });

            console.log(`✅ SpecDiff 已寫入：${filePath}`);
