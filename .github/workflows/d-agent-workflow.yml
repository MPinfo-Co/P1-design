name: D-Agent-Workflow

on:
  push:
    branches:
      - 'sd-*'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'SD Issue Number'
        required: true
      sa_number:
        description: 'SA Issue Number'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  sd-worker:
    # 只在 a-workflow scaffold TDD 檔案時觸發，或手動 dispatch
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'scaffold TDD')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve branch name
        id: branch-info
        uses: actions/github-script@v7
        with:
          script: |
            let issueNumber, branch;
            if (context.eventName === 'workflow_dispatch') {
              issueNumber = '${{ github.event.inputs.issue_number }}';
              // 用 API 找 sd-{N}-* 的 branch
              const branches = await github.paginate(github.rest.git.listMatchingRefs, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/sd-${issueNumber}-`,
              });
              if (branches.length === 0) {
                core.setFailed(`找不到 sd-${issueNumber}-* 的 branch`);
                return;
              }
              branch = branches[0].ref.replace('refs/heads/', '');
              console.log(`Found branch: ${branch}`);
            } else {
              branch = '${{ github.ref_name }}';
              issueNumber = branch.match(/^sd-(\d+)/)?.[1];
              if (!issueNumber) {
                core.setFailed(`Cannot parse issue number from branch: ${branch}`);
                return;
              }
            }
            core.setOutput('issue_number', issueNumber);
            core.setOutput('branch', branch);
            console.log(`SD Issue #${issueNumber}, Branch: ${branch}`);

      - name: Checkout SD branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch-info.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get SA issue number from inputs or SD issue body
        id: sa-info
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              const saNumber = '${{ github.event.inputs.sa_number }}';
              core.setOutput('sa_number', saNumber);
              console.log(`SA Issue #${saNumber} (from inputs)`);
              return;
            }
            const issueNumber = parseInt('${{ steps.branch-info.outputs.issue_number }}');
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const body = issue.data.body || '';
            const saMatch = body.match(/SA Issue：(?:MPinfo-Co\/P1-design#|P1-design #)(\d+)/);
            if (!saMatch) {
              core.setFailed(`SD Issue #${issueNumber} body 找不到 SA Issue 編號`);
              return;
            }
            core.setOutput('sa_number', saMatch[1]);
            console.log(`SA Issue #${saMatch[1]}`);

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      - name: Build prompt
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          SA_NUMBER="${{ steps.sa-info.outputs.sa_number }}"
          sed "s/ISSUE_NUMBER/${ISSUE_NUMBER}/g; s/SA_NUMBER/${SA_NUMBER}/g" \
            .github/prompts/sd-worker.md > /tmp/sd-prompt.txt
          echo "Prompt built for SD #$ISSUE_NUMBER (SA #$SA_NUMBER)"
          cat /tmp/sd-prompt.txt

      - name: Run SD Worker Agent
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions --print < /tmp/sd-prompt.txt

      - name: Commit TDD
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          BRANCH="${{ steps.branch-info.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "SD/sd-${ISSUE_NUMBER}-TDD.md"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(sd-${ISSUE_NUMBER}): SD 產出 TDD"
          git push origin "$BRANCH"

      - name: Post comment to SD issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.branch-info.outputs.issue_number }}');
            const branch = '${{ steps.branch-info.outputs.branch }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '🤖 TDD 已自動產出，請至 branch 確認：',
                `- 檔案：\`SD/sd-${issueNumber}-TDD.md\``,
                `- Branch：\`${branch}\``,
                '',
                '確認無誤後請 merge。',
              ].join('\n'),
            });
