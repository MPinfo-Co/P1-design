name: D-Agent-Workflow

on:
  push:
    branches:
      - 'issue-*'

permissions:
  contents: write
  issues: write

jobs:
  sd-worker:
    # 只在 a-workflow scaffold TDD 檔案時觸發
    if: contains(github.event.head_commit.message, 'scaffold TDD 檔案')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SD branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout P1-analysis（業務邏輯）
        uses: actions/checkout@v4
        with:
          repository: MPinfo-Co/P1-analysis
          path: p1-analysis
          ref: main

      - name: Extract issue number from branch name
        id: branch-info
        run: |
          BRANCH="${{ github.ref_name }}"
          ISSUE_NUMBER=$(echo "$BRANCH" | sed 's/^issue-\([0-9]*\).*/\1/')
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Cannot parse issue number from branch: $BRANCH"
            exit 1
          fi
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "SD Issue #$ISSUE_NUMBER, Branch: $BRANCH"

      - name: Get SA issue number from SD issue body
        id: sa-info
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.branch-info.outputs.issue_number }}');
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const body = issue.data.body || '';
            const saMatch = body.match(/SA Issue：(?:MPinfo-Co\/P1-analysis#|P1-analysis #)(\d+)/);
            if (!saMatch) {
              core.setFailed(`SD Issue #${issueNumber} body 找不到 SA Issue 編號`);
              return;
            }
            core.setOutput('sa_number', saMatch[1]);
            console.log(`SA Issue #${saMatch[1]}`);

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      - name: Build prompt
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          SA_NUMBER="${{ steps.sa-info.outputs.sa_number }}"
          sed "s/ISSUE_NUMBER/${ISSUE_NUMBER}/g; s/SA_NUMBER/${SA_NUMBER}/g" \
            .github/prompts/sd-worker.md > /tmp/sd-prompt.txt
          echo "Prompt built for SD #$ISSUE_NUMBER (SA #$SA_NUMBER)"
          cat /tmp/sd-prompt.txt

      - name: Run SD Worker Agent
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions --print < /tmp/sd-prompt.txt

      - name: Commit TDD
        run: |
          ISSUE_NUMBER="${{ steps.branch-info.outputs.issue_number }}"
          BRANCH="${{ steps.branch-info.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "TDD/issue-${ISSUE_NUMBER}.md"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(issue-${ISSUE_NUMBER}): SD 產出 TDD

自動產出，對應 SD Issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

      - name: Post comment to SD issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.branch-info.outputs.issue_number }}');
            const branch = '${{ steps.branch-info.outputs.branch }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '🤖 TDD 已自動產出，請至 branch 確認：',
                `- 檔案：\`TDD/issue-${issueNumber}.md\``,
                `- Branch：\`${branch}\``,
                '',
                '確認無誤後請 merge。',
              ].join('\n'),
            });
