<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Box — 資安專家設定</title>
    <link rel="stylesheet" href="_style.css">
</head>
<body data-page="settings-ai">
    <div id="appContainer" class="app-container" style="display:grid;">
        <!-- sidebar + header 由 _nav.js 注入 -->
        <div class="main-content">

            <!-- 區 A · 分析行為 -->
            <div class="card" style="margin-bottom:18px;">
                <h3 style="font-size:15px; color:#1e293b; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e2e8f0;">區 A · 分析行為</h3>
                <div class="input-group">
                    <label style="font-weight:700;">綁定知識庫（多選）</label>
                    <div style="margin:6px 0 10px; padding:10px 12px; background:#fef9c3; border-left:3px solid #ca8a04; border-radius:4px; font-size:12px; color:#713f12; line-height:1.6;">
                        此處選擇資安專家分析時可參考的知識庫；<strong>規則內容寫在 KB 的「分析規則」tab 內</strong>。若要設定誰能編輯該 KB，請至 KB 詳情 → 存取設定 tab。
                    </div>
                    <div id="settingKbBindings" style="display:flex; flex-direction:column; gap:8px;"></div>
                </div>
                <div class="input-group" style="margin-bottom:0;">
                    <label style="font-weight:700;">分析模式</label>
                    <div style="display:flex; gap:18px; margin-top:6px;">
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="radio" name="analysisMode" value="full" checked> 完整（Windows + FortiGate）
                        </label>
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="radio" name="analysisMode" value="windows_only"> 僅 Windows
                        </label>
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="radio" name="analysisMode" value="fortigate_only"> 僅防火牆
                        </label>
                    </div>
                    <div style="margin-top:6px; font-size:11px; color:#94a3b8;">註：「僅防火牆」後端目前未實作，雛型 UI 先到位。</div>
                </div>
            </div>

            <!-- 區 B · 排程 -->
            <div class="card" style="margin-bottom:18px;">
                <h3 style="font-size:15px; color:#1e293b; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e2e8f0;">區 B · 排程</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <label style="font-weight:700;">觸發時間</label>
                        <input type="time" id="settingScheduleTime" value="02:00">
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label style="font-weight:700;">觸發頻率</label>
                        <div style="display:flex; gap:18px; margin-top:6px;">
                            <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                                <input type="radio" name="scheduleFreq" value="daily" checked> 每日
                            </label>
                            <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                                <input type="radio" name="scheduleFreq" value="weekly"> 每週
                            </label>
                            <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                                <input type="radio" name="scheduleFreq" value="manual"> 手動
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 區 C · 資料來源（SSB） -->
            <div class="card" style="margin-bottom:18px;">
                <h3 style="font-size:15px; color:#1e293b; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e2e8f0;">區 C · 資料來源（SSB）</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Host</label>
                        <input type="text" id="ssbHost" value="192.168.10.48">
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Logspace</label>
                        <input type="text" id="ssbLogspace" value="center">
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Username</label>
                        <input type="text" id="ssbUser" value="mpinfo">
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Password</label>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <input type="password" id="ssbPass" value="mock_password" style="flex:1;">
                            <button id="ssbPassToggle" class="btn btn-outline" type="button" style="font-size:12px; padding:6px 10px;" onclick="togglePass()">顯示</button>
                        </div>
                    </div>
                </div>
                <div style="margin-top:14px; text-align:right;">
                    <button class="btn btn-outline" onclick="alert('✅ 連線成功')">測試連線</button>
                </div>
            </div>

            <!-- 區 D · 通知 -->
            <div class="card" style="margin-bottom:18px;">
                <h3 style="font-size:15px; color:#1e293b; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e2e8f0;">區 D · 通知</h3>
                <div class="input-group">
                    <label style="font-weight:700;">通知方式</label>
                    <div style="display:flex; gap:18px; margin-top:6px;">
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="checkbox" id="notifyEmail" checked> Email
                        </label>
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="checkbox" id="notifyWebhook" onchange="toggleWebhookField()"> Webhook
                        </label>
                        <label style="display:flex; align-items:center; gap:6px; font-weight:400; cursor:pointer;">
                            <input type="checkbox" id="notifyInApp" checked> 系統內
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email 收件人（多筆以逗號分隔）</label>
                    <input type="text" id="notifyEmailRecipients" value="admin@company.com">
                </div>
                <div class="input-group" id="webhookUrlGroup" style="display:none; margin-bottom:0;">
                    <label>Webhook URL</label>
                    <input type="text" id="notifyWebhookUrl" placeholder="https://hooks.example.com/...">
                </div>
            </div>

            <!-- 儲存 -->
            <div style="text-align:right;">
                <button class="btn btn-primary" style="padding:10px 28px; font-size:14px;" onclick="saveSettings()">儲存</button>
            </div>
        </div>
    </div>

    <script src="_mockdata.js"></script>
    <script src="_state.js"></script>
    <script src="_nav.js"></script>
    <script>
    // 渲染 KB 綁定 checkbox（依 partnerKbBindings 預設勾選狀態）
    function renderKbBindings() {
        var box = document.getElementById('settingKbBindings');
        var bound = partnerKbBindings['資安專家'] || [];
        box.innerHTML = allKnowledgeBases.map(function(kb) {
            var checked = bound.indexOf(kb.id) !== -1 ? 'checked' : '';
            return '<label style="display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border:1px solid #e2e8f0; border-radius:6px; cursor:pointer; font-weight:400;">' +
                '<input type="checkbox" data-kbid="' + kb.id + '" ' + checked + ' style="margin-top:3px;">' +
                '<span><strong style="color:#1e293b;">' + kb.name + '</strong>' +
                '<small style="display:block; color:#64748b; font-size:11px; margin-top:2px;">' + kb.desc + '</small></span></label>';
        }).join('');
    }

    function togglePass() {
        var el = document.getElementById('ssbPass');
        var btn = document.getElementById('ssbPassToggle');
        el.type = el.type === 'password' ? 'text' : 'password';
        if (btn) btn.textContent = el.type === 'password' ? '顯示' : '隱藏';
    }

    function toggleWebhookField() {
        document.getElementById('webhookUrlGroup').style.display =
            document.getElementById('notifyWebhook').checked ? 'block' : 'none';
    }

    function saveSettings() {
        // 將 KB 勾選回寫到 partnerKbBindings（雛型只在記憶體內）
        var checks = document.querySelectorAll('#settingKbBindings input[type=checkbox]');
        partnerKbBindings['資安專家'] = Array.prototype.filter.call(checks, function(c){ return c.checked; })
            .map(function(c){ return parseInt(c.dataset.kbid, 10); });
        alert('✅ 知識庫綁定已儲存（其他設定為雛型 UI 佔位，未持久化）');
    }

    // 初始
    renderKbBindings();
    </script>
</body>
</html>
