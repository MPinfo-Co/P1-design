<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Box 登入</title>
    <link rel="stylesheet" href="_style.css">
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h1 style="display:flex;justify-content:center;align-items:center;gap:10px;">MP-Box</h1>
            <div class="input-group">
                <label>帳號</label>
                <input type="text" id="loginUser" value="rex">
            </div>
            <div class="input-group">
                <label>密碼</label>
                <input type="password" id="loginPass" value="123">
            </div>
            <button class="login-btn" onclick="login()">登入系統</button>
        </div>
    </div>

    <script src="_state.js"></script>
    <script>
    function login() {
        const userVal = document.getElementById('loginUser').value.toLowerCase();
        const passVal = document.getElementById('loginPass').value;
        if (userVal === 'rex' && passVal === '123') {
            setUser({ name: 'Rex Shen', roles: ['管理員'] });
        } else if (userVal === 'user' && passVal === '123') {
            setUser({ name: '一般用戶', roles: ['一般使用者'] });
        } else {
            alert('帳號或密碼錯誤 (測試用: rex/123 或 user/123)');
            return;
        }
        location.href = 'ai-partner.html';
    }
    // 若已登入，直接跳轉
    if (getUser()) location.href = 'ai-partner.html';
    </script>
</body>
</html>
