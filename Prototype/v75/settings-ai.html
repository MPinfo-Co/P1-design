<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Box — AI夥伴管理</title>
    <link rel="stylesheet" href="_style.css">
</head>
<body data-page="settings-ai">
    <div id="appContainer" class="app-container" style="display:grid;">
        <!-- sidebar + header 由 _nav.js 注入 -->
        <div class="main-content">
            <!-- AI 夥伴列表 -->
            <div id="configList">
                <div style="display:flex; justify-content:flex-end; align-items:center; margin-bottom:15px;">
                    <button class="btn btn-primary" onclick="openAddPartner()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增AI夥伴
                    </button>
                </div>
                <div class="card" style="padding:0;">
                    <table class="table">
                        <thead><tr><th>AI夥伴名稱</th><th>狀態</th><th>說明</th><th>執行動作</th></tr></thead>
                        <tbody id="aiPartnerTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 預設資安專家夥伴設定 -->
            <div id="configFormBuiltin" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <p style="font-size:13px; color:#64748b;">可設定項目：核心推理模型、公司背景資訊、綁定知識庫、通知觸發條件與通知準則。</p>
                    <button class="btn btn-outline" onclick="backToList()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        回上一頁
                    </button>
                </div>
                <div class="card">
                    <div class="config-section">
                        <h3 style="margin-bottom:12px; color:#1e293b; display:flex; align-items:center; gap:8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2e3f6e" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                            核心推理模型
                        </h3>
                        <div style="display:flex; align-items:center; gap:12px; padding:12px 16px; background:#f1f5f9; border-radius:8px; border:1px solid #e2e8f0;">
                            <div>
                                <div style="font-weight:700; color:#1e293b; font-size:14px;">Gemini 1.5 Pro</div>
                                <div style="font-size:12px; color:#64748b; margin-top:2px;">由系統預設配置，已針對資安分析情境調優，無需調整。</div>
                            </div>
                        </div>
                    </div>
                    <div class="config-section">
                        <h3 style="margin-bottom:10px; color:#1e293b; display:flex; align-items:center; gap:8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                            綁定知識庫
                            <span style="font-size:11px; color:#94a3b8; font-weight:400;">(勾選此 AI 夥伴可引用的知識庫，支援多選)</span>
                        </h3>
                        <div id="builtinKbBindChecks" style="display:flex; flex-direction:column; gap:8px;"></div>
                        <div style="margin-top:10px;">
                            <a href="kb.html" style="font-size:12px; color:#2e3f6e; text-decoration:none; font-weight:600;">前往管理知識庫 →</a>
                        </div>
                    </div>
                    <div class="config-section" style="border-bottom:none; padding-bottom:0;">
                        <h3 style="margin-bottom:16px; color:#1e293b; display:flex; align-items:center; gap:8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
                            通知設定
                        </h3>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div class="input-group" style="margin-bottom:0;">
                                <label style="font-size:13px;">通知觸發條件</label>
                                <select style="margin-top:6px;"><option>3 星以上即通知</option><option selected>4 星以上即通知</option><option>僅 5 星通知</option></select>
                            </div>
                            <div class="input-group" style="margin-bottom:0;">
                                <label style="font-size:13px;">報告語氣 / 格式</label>
                                <select style="margin-top:6px;"><option selected>技術詳細版（給資安工程師）</option><option>摘要版（給主管 / CISO）</option><option>雙版並陳</option></select>
                            </div>
                            <div class="input-group" style="margin-bottom:0; grid-column:1/-1;">
                                <label style="font-size:13px;">Email 通知對象</label>
                                <input type="text" style="margin-top:6px;" placeholder="soc-team@company.com">
                            </div>
                        </div>
                    </div>
                </div>
                <div style="margin-top:20px; text-align:right;">
                    <button class="btn btn-primary" onclick="alert('夥伴設定已儲存'); backToList();">儲存設定</button>
                </div>
            </div>

            <!-- 自訂 AI 夥伴設定 -->
            <div id="configFormCustom" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <p id="customConfigSubtitle" style="font-size:13px; color:#64748b;">自訂此 AI 夥伴的推理模型、角色定義與綁定知識庫。</p>
                    <button class="btn btn-outline" onclick="backToList()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        回上一頁
                    </button>
                </div>
                <div class="card">
                    <div class="config-section">
                        <h3 style="margin-bottom:12px; color:#1e293b; display:flex; align-items:center; gap:8px;">核心模型選擇</h3>
                        <div class="input-group" style="margin:0;">
                            <label style="font-size:13px; color:#64748b;">決定此 AI 夥伴的底層推理模型</label>
                            <select style="margin-top:6px;"><option>Gemini 1.5 Pro</option><option selected>Gemini 1.5 Flash</option><option>OpenAI GPT-4o</option><option>Claude 3.5 Sonnet</option></select>
                        </div>
                    </div>
                    <div class="config-section">
                        <h3 style="margin-bottom:12px; color:#1e293b; display:flex; align-items:center; gap:8px;">系統提示詞 (System Prompt)</h3>
                        <div class="input-group" style="margin:0;">
                            <textarea id="customPromptField" rows="6" placeholder="例如：你是一位專精於電商訂單流程的助理..."></textarea>
                        </div>
                    </div>
                    <div class="config-section" style="border-bottom:none; padding-bottom:0;">
                        <h3 style="margin-bottom:10px; color:#1e293b; display:flex; align-items:center; gap:8px;">綁定知識庫</h3>
                        <div id="customKbBindChecks" style="display:flex; flex-direction:column; gap:8px;"></div>
                        <div style="margin-top:10px;">
                            <a href="kb.html" style="font-size:12px; color:#2e3f6e; text-decoration:none; font-weight:600;">前往管理知識庫 →</a>
                        </div>
                    </div>
                    <div style="margin-top:24px; text-align:right;">
                        <button class="btn btn-primary" onclick="alert('夥伴設定已儲存'); backToList();">儲存設定</button>
                    </div>
                </div>
            </div>

            <!-- 新增 AI 夥伴表單 -->
            <div id="aiAddForm" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <p style="font-size:13px; color:#64748b;">設定新 AI 夥伴的名稱、推理模型與角色定義。</p>
                    <button class="btn btn-outline" onclick="backToList()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        回上一頁
                    </button>
                </div>
                <div class="card">
                    <div class="input-group"><label>夥伴名稱</label><input type="text" placeholder="例如：法務遵循專家"></div>
                    <div class="input-group">
                        <label>核心模型</label>
                        <select><option>Gemini 1.5 Pro</option><option selected>Gemini 1.5 Flash</option><option>OpenAI GPT-4o</option><option>Claude 3.5 Sonnet</option></select>
                    </div>
                    <div class="input-group">
                        <label>系統提示詞 (System Prompt)</label>
                        <textarea rows="5" placeholder="例如：你是一位專精於台灣勞動基準法的法律顧問..."></textarea>
                    </div>
                    <div style="text-align:right;">
                        <button class="btn btn-primary" onclick="alert('夥伴已建立'); backToList();">確認新增</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="_state.js"></script>
    <script src="_nav.js"></script>
    <script>
    function backToList() {
        document.getElementById('configList').style.display = 'block';
        document.getElementById('configFormBuiltin').style.display = 'none';
        document.getElementById('configFormCustom').style.display = 'none';
        document.getElementById('aiAddForm').style.display = 'none';
        document.getElementById('pageTitle').innerText = 'AI夥伴管理';
    }

    function renderKbBindChecks(containerId) {
        var el = document.getElementById(containerId); if (!el) return;
        if (allKnowledgeBases.length === 0) {
            el.innerHTML = '<div style="font-size:13px;color:#94a3b8;padding:10px;">尚未建立任何知識庫。<a href="kb.html" style="color:#2e3f6e;font-weight:600;">前往建立 →</a></div>';
            return;
        }
        el.innerHTML = allKnowledgeBases.map(function(kb) {
            return '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;background:#f8fafc;border:1px solid #e2e8f0;">' +
                '<input type="checkbox" checked style="width:15px;height:15px;accent-color:#2e3f6e;">' +
                '<div><div style="font-size:13px;font-weight:600;color:#1e293b;">' + kb.name + '</div>' +
                '<div style="font-size:11px;color:#94a3b8;">' + kb.docs.length + ' 份文件 · ' + kb.tables.length + ' 張資料表</div></div></label>';
        }).join('');
    }

    function renderAIList() {
        const partnersData = [
            { id: 1, name: '資安專家', status: '啟用中', desc: '可設定：核心推理模型、公司背景資訊、綁定知識庫、通知觸發條件與準則。', builtin: true, disabled: false },
            { id: 2, name: '訂單智能秘書', status: '停用中', desc: '自動化處理電商訂單流程，分類退換貨請求與客服回覆。', builtin: false, disabled: true }
        ];
        const tbody = document.getElementById('aiPartnerTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        partnersData.forEach(p => {
            const badge = p.builtin ? '<span class="badge-builtin">預設</span>' : '<span class="badge-new">自訂</span>';
            const statusStyle = p.disabled ? 'color:#94a3b8;' : 'color:#10b981;';
            const statusDot = p.disabled ? '○' : '●';
            let actionBtns;
            if (p.builtin) {
                actionBtns = '<button class="btn btn-outline" onclick="openBuiltinConfig()">夥伴設定</button>';
            } else {
                actionBtns = '<button class="btn btn-outline" onclick="openCustomConfig(\'' + p.name + '\')" style="' + (p.disabled ? 'opacity:0.5;' : '') + '">夥伴設定</button>' +
                    '<button class="btn btn-outline" style="color:#ef4444; border-color:#fca5a5; margin-left:6px;" onclick="alert(\'已刪除\');renderAIList()">刪除</button>';
            }
            tbody.innerHTML += '<tr style="' + (p.disabled ? 'opacity:0.6;background-color:#f8fafc;' : '') + '">' +
                '<td style="font-weight:600;">' + p.name + badge + '</td>' +
                '<td><span style="' + statusStyle + ' font-weight:700;">' + statusDot + ' ' + p.status + '</span></td>' +
                '<td style="color:#64748b;">' + p.desc + '</td>' +
                '<td>' + actionBtns + '</td></tr>';
        });
    }

    function openAddPartner() {
        document.getElementById('configList').style.display = 'none';
        document.getElementById('aiAddForm').style.display = 'block';
        document.getElementById('pageTitle').innerText = '新增AI夥伴';
    }

    function openBuiltinConfig() {
        document.getElementById('pageTitle').innerText = '資安專家 · 夥伴設定';
        document.getElementById('configList').style.display = 'none';
        document.getElementById('configFormBuiltin').style.display = 'block';
        document.getElementById('configFormCustom').style.display = 'none';
        document.getElementById('aiAddForm').style.display = 'none';
        renderKbBindChecks('builtinKbBindChecks');
    }

    function openCustomConfig(name) {
        document.getElementById('pageTitle').innerText = (name || 'AI夥伴') + ' · 夥伴設定';
        document.getElementById('configList').style.display = 'none';
        document.getElementById('configFormBuiltin').style.display = 'none';
        document.getElementById('configFormCustom').style.display = 'block';
        document.getElementById('aiAddForm').style.display = 'none';
        renderKbBindChecks('customKbBindChecks');
    }

    document.addEventListener('DOMContentLoaded', renderAIList);
    </script>
</body>
</html>
