<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Box — 知識庫</title>
    <link rel="stylesheet" href="_style.css">
</head>
<body data-page="kb">
    <div id="appContainer" class="app-container" style="display:grid;">
        <!-- sidebar + header 由 _nav.js 注入 -->
        <div class="main-content">
            <!-- 知識庫列表 -->
            <div id="kbListView">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="color:#1e293b;">知識庫</h2>
                    <button class="btn btn-primary" onclick="openKbCreate()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        新增知識庫
                    </button>
                </div>
                <div class="card filter-bar" style="margin-bottom:15px;">
                    <div class="filter-group">
                        <label>關鍵字搜尋:</label>
                        <input type="text" id="kbSearchKeyword" placeholder="搜尋知識庫名稱或說明..." oninput="renderKbCards()">
                    </div>
                </div>
                <div class="ai-grid" id="kbCardGrid"></div>
            </div>

            <!-- 知識庫詳情 -->
            <div id="kbDetailView" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        <h2 id="kbDetailTitle" style="color:#1e293b; font-size:18px;"></h2>
                    </div>
                    <button class="btn btn-outline" onclick="closeKbDetail()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        回知識庫列表
                    </button>
                </div>
                <p id="kbDetailDesc" style="font-size:13px; color:#64748b; margin-bottom:4px;"></p>
                <p id="kbDetailBoundPartners" style="font-size:12px; color:#2e3f6e; margin-bottom:18px; font-weight:600;"></p>

                <!-- Tab 導航 -->
                <div class="detail-tab-nav" style="margin-bottom:0;">
                    <button class="detail-tab-btn active" id="kb-tab-btn-docs" onclick="switchKbTab('docs')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        文件
                    </button>
                    <button class="detail-tab-btn" id="kb-tab-btn-tables" onclick="switchKbTab('tables')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                        資料表
                    </button>
                    <button class="detail-tab-btn" id="kb-tab-btn-access" onclick="switchKbTab('access')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        存取設定
                    </button>
                </div>

                <!-- Tab 1：文件 -->
                <div class="detail-tab-panel active" id="kb-tab-docs" style="border-radius:0 0 8px 8px; border:1px solid #e2e8f0; border-top:none; padding:20px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                        <div>
                            <span style="font-size:14px; font-weight:700; color:#1e293b;">非結構化文件</span>
                            <span style="font-size:11px; color:#94a3b8; margin-left:8px;">上傳 PDF / Word / TXT，系統自動進行向量化索引</span>
                        </div>
                        <label style="display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:#2e3f6e; color:white; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            上傳文件
                            <input type="file" style="display:none;" onchange="mockUploadKbDoc(this)">
                        </label>
                    </div>
                    <div style="margin-bottom:12px;">
                        <input type="text" id="kbDocSearch" placeholder="搜尋檔案名稱..." oninput="renderKbDocsFromCurrent()" style="padding:7px 12px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; outline:none; width:260px;">
                    </div>
                    <div id="kbDocList"></div>
                    <div id="kbDocPagination" class="pagination"></div>
                </div>

                <!-- Tab 2：資料表 -->
                <div class="detail-tab-panel" id="kb-tab-tables" style="border-radius:0 0 8px 8px; border:1px solid #e2e8f0; border-top:none; padding:20px;">
                    <div id="kbTableListView">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                            <div>
                                <span style="font-size:14px; font-weight:700; color:#1e293b;">結構化資料表</span>
                                <span style="font-size:11px; color:#94a3b8; margin-left:8px;">可自訂建立、由模板建立或匯入 Excel/CSV</span>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-primary" onclick="openCustomTableCreate()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    自訂建立
                                </button>
                                <button class="btn btn-outline" onclick="openStructuredTemplateModal()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                                    從模板建立
                                </button>
                                <label style="display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border:1px solid #cbd5e1; background:white; color:#334155; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    匯入 Excel/CSV
                                    <input type="file" accept=".xlsx,.xls,.csv" style="display:none;" onchange="mockUploadKbExcel(this)">
                                </label>
                            </div>
                        </div>
                        <div style="margin-bottom:12px;">
                            <input type="text" id="kbTableSearch" placeholder="搜尋資料表名稱..." oninput="renderKbTablesFromCurrent()" style="padding:7px 12px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; outline:none; width:260px;">
                        </div>
                        <div id="kbTableList"></div>
                    </div>
                    <!-- 資料表詳情 -->
                    <div id="kbTableDetailView" style="display:none;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <h3 id="kbTableDetailTitle" style="color:#1e293b; font-size:16px;"></h3>
                                <span id="kbTableDetailMeta" style="font-size:11px; color:#94a3b8;"></span>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-primary" style="font-size:12px;" onclick="addTableRow()">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    新增資料
                                </button>
                                <button class="btn btn-outline" style="font-size:12px;" id="kbTableEditBtn">編輯欄位</button>
                                <button class="btn btn-outline" onclick="closeTableDetail()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                                    回資料表列表
                                </button>
                            </div>
                        </div>
                        <div id="kbTableDetailContent"></div>
                        <div id="kbTableDetailPagination" class="pagination"></div>
                    </div>
                </div>

                <!-- Tab 3：存取設定 -->
                <div class="detail-tab-panel" id="kb-tab-access" style="border-radius:0 0 8px 8px; border:1px solid #e2e8f0; border-top:none; padding:20px;">
                    <div style="margin-bottom:16px;">
                        <span style="font-size:14px; font-weight:700; color:#1e293b;">角色存取控制</span>
                        <span style="font-size:11px; color:#94a3b8; margin-left:8px;">勾選可存取此知識庫的角色，未勾選的角色在使用 AI 夥伴時將無法引用此知識庫內容</span>
                    </div>
                    <div id="kbAccessRoleChecks" style="display:flex; flex-direction:column; gap:8px;"></div>
                    <div style="margin-top:20px; text-align:right;">
                        <button class="btn btn-primary" onclick="saveKbAccess()">儲存存取設定</button>
                    </div>
                </div>
            </div>

            <!-- 新增知識庫表單 -->
            <div id="kbCreateForm" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:#1e293b;">新增知識庫</h2>
                    <button class="btn btn-outline" onclick="closeKbCreate()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        取消
                    </button>
                </div>
                <div class="card">
                    <div class="input-group">
                        <label>知識庫名稱</label>
                        <input type="text" id="kbNewName" placeholder="例如：資安相關、MIS 維運">
                    </div>
                    <div class="input-group">
                        <label>說明</label>
                        <textarea id="kbNewDesc" rows="3" placeholder="描述此知識庫的用途與涵蓋範圍..."></textarea>
                    </div>
                    <div style="text-align:right;">
                        <button class="btn btn-primary" onclick="createKb()">建立知識庫</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="structuredTemplateModal" class="modal">
        <div class="modal-content" style="max-width:520px;">
            <h3 style="color:#1e293b; margin-bottom:16px;">從模板建立資料表</h3>
            <p style="font-size:13px; color:#64748b; margin-bottom:16px;">選擇一個預設模板，系統將自動建立欄位定義。建立後可手動新增資料或匯入 Excel。</p>
            <div style="display:flex; flex-direction:column; gap:10px;" id="templateOptions">
                <label style="display:flex; align-items:flex-start; gap:12px; padding:14px; border:1.5px solid #e2e8f0; border-radius:8px; cursor:pointer;">
                    <input type="radio" name="tpl" value="asset" checked style="width:16px; height:16px; accent-color:#2e3f6e; margin-top:2px;">
                    <div>
                        <div style="font-size:14px; font-weight:700; color:#1e293b;">設備資產表</div>
                        <div style="font-size:12px; color:#64748b; margin-top:3px;">欄位：設備名稱、IP 位址、MAC 位址、作業系統、負責人、位置、備註</div>
                    </div>
                </label>
                <label style="display:flex; align-items:flex-start; gap:12px; padding:14px; border:1.5px solid #e2e8f0; border-radius:8px; cursor:pointer;">
                    <input type="radio" name="tpl" value="account_perm" style="width:16px; height:16px; accent-color:#2e3f6e; margin-top:2px;">
                    <div>
                        <div style="font-size:14px; font-weight:700; color:#1e293b;">帳號權限矩陣</div>
                        <div style="font-size:12px; color:#64748b; margin-top:3px;">欄位：帳號名稱、所屬部門、權限等級、系統存取範圍、最後登入時間、狀態</div>
                    </div>
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('structuredTemplateModal')">取消</button>
                <button class="btn btn-primary" onclick="createFromTemplate()">建立資料表</button>
            </div>
        </div>
    </div>

    <div id="excelConfirmModal" class="modal">
        <div class="modal-content" style="max-width:560px;">
            <h3 style="color:#1e293b; margin-bottom:12px;">確認匯入欄位</h3>
            <p style="font-size:13px; color:#64748b; margin-bottom:14px;">系統已偵測以下欄位，請確認後匯入：</p>
            <div id="excelFieldPreview" style="border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; margin-bottom:16px;"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('excelConfirmModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmExcelImport()">確認匯入</button>
            </div>
        </div>
    </div>

    <div id="customTableModal" class="modal">
        <div class="modal-content" style="max-width:560px; max-height:80vh; display:flex; flex-direction:column;">
            <h3 style="color:#1e293b; margin-bottom:12px; flex-shrink:0;">自訂建立資料表</h3>
            <p style="font-size:13px; color:#64748b; margin-bottom:14px; flex-shrink:0;">自訂資料表名稱與欄位，建立後可在「檢視」中新增資料。</p>
            <div style="overflow-y:auto; flex:1;">
                <div class="input-group" style="margin-bottom:12px;">
                    <label style="font-size:13px; font-weight:600;">資料表名稱</label>
                    <input type="text" id="customTableName" placeholder="例如：軟體授權清單" style="margin-top:4px;">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">欄位定義</label>
                    <div id="customTableColumns" style="display:flex; flex-direction:column; gap:6px;">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <input type="text" class="custom-col-input" value="欄位 1" style="flex:1; padding:6px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; outline:none;">
                            <button class="btn btn-outline" style="padding:2px 6px; font-size:11px; color:#ef4444; border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <input type="text" class="custom-col-input" value="欄位 2" style="flex:1; padding:6px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; outline:none;">
                            <button class="btn btn-outline" style="padding:2px 6px; font-size:11px; color:#ef4444; border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button>
                        </div>
                    </div>
                    <button class="btn btn-outline" onclick="addCustomTableCol()" style="margin-top:8px; font-size:12px; padding:4px 10px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增欄位
                    </button>
                </div>
            </div>
            <div class="modal-footer" style="flex-shrink:0;">
                <button class="btn btn-outline" onclick="closeModal('customTableModal')">取消</button>
                <button class="btn btn-primary" onclick="createCustomTable()">建立資料表</button>
            </div>
        </div>
    </div>

    <script src="_mockdata.js"></script>
    <script src="_state.js"></script>
    <script src="_nav.js"></script>
    <script>
    let currentKbId = null;
    let pendingExcelData = null;
    let editingTableId = null;
    let viewingTableId = null;
    var kbDocPage = 1;
    var KB_DOC_PAGE_SIZE = 10;
    var kbTableDetailPage = 1;
    var KB_TABLE_DETAIL_PAGE_SIZE = 10;

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function getBoundPartners(kbId) {
        var r = [];
        for (var n in partnerKbBindings) { if (partnerKbBindings[n].indexOf(kbId) !== -1) r.push(n); }
        return r;
    }

    function renderKbCards() {
        var grid = document.getElementById('kbCardGrid');
        if (!grid) return;
        grid.innerHTML = '';
        var kw = (document.getElementById('kbSearchKeyword') ? document.getElementById('kbSearchKeyword').value : '').toLowerCase().trim();
        var filtered = allKnowledgeBases.filter(function(kb) {
            return !kw || kb.name.toLowerCase().includes(kw) || kb.desc.toLowerCase().includes(kw);
        });
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center;padding:60px 0;color:#94a3b8;grid-column:1/-1;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" style="margin-bottom:12px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><div>' + (kw ? '找不到符合的知識庫' : '尚未建立任何知識庫') + '</div></div>';
            return;
        }
        filtered.forEach(function(kb) {
            var p = getBoundPartners(kb.id);
            var card = document.createElement('div');
            card.className = 'ai-card';
            card.onclick = function() { openKbDetail(kb.id); };
            card.innerHTML = '<svg viewBox="0 0 24 24" stroke="#64748b"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' +
                '<h3 style="color:#1e293b;">' + kb.name + '</h3>' +
                '<p style="color:#64748b;font-size:13px;margin-top:10px;">' + kb.desc + '</p>' +
                '<div style="display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:12px;color:#475569;"><span>' + kb.docs.length + ' 份文件</span><span>|</span><span>' + kb.tables.length + ' 張資料表</span></div>' +
                '<div style="margin-top:8px;font-size:11px;color:#94a3b8;">使用此知識庫的 AI 夥伴：' + (p.length > 0 ? p.join('、') : '未綁定') + '</div>';
            grid.appendChild(card);
        });
    }

    function openKbDetail(id) {
        currentKbId = id;
        var kb = allKnowledgeBases.find(function(k) { return k.id === id; });
        if (!kb) return;
        document.getElementById('kbListView').style.display = 'none';
        document.getElementById('kbCreateForm').style.display = 'none';
        document.getElementById('kbDetailView').style.display = 'block';
        document.getElementById('kbDetailTitle').textContent = kb.name;
        document.getElementById('kbDetailDesc').textContent = kb.desc;
        var partners = getBoundPartners(kb.id);
        var bpEl = document.getElementById('kbDetailBoundPartners');
        if (bpEl) bpEl.innerHTML = partners.length > 0
            ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2e3f6e" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z"/></svg>使用此知識庫的 AI 夥伴：' + partners.join('、')
            : '<span style="color:#94a3b8;font-weight:400;">尚未被任何 AI 夥伴綁定</span>';
        document.getElementById('pageTitle').innerText = '知識庫 · ' + kb.name;
        kbDocPage = 1;
        switchKbTab('docs');
        renderKbDocs(kb);
        renderKbTables(kb);
        renderKbAccess(kb);
    }

    function closeKbDetail() {
        document.getElementById('kbDetailView').style.display = 'none';
        document.getElementById('kbListView').style.display = 'block';
        document.getElementById('pageTitle').innerText = '知識庫';
        currentKbId = null;
        renderKbCards();
    }

    function switchKbTab(tab) {
        ['docs','tables','access'].forEach(function(t) {
            var b = document.getElementById('kb-tab-btn-'+t), p = document.getElementById('kb-tab-'+t);
            if (b) b.classList.toggle('active', t===tab);
            if (p) p.classList.toggle('active', t===tab);
        });
        if (tab === 'tables') { document.getElementById('kbTableListView').style.display='block'; document.getElementById('kbTableDetailView').style.display='none'; viewingTableId=null; }
    }

    function renderKbDocsFromCurrent() { kbDocPage=1; var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;}); if(kb) renderKbDocs(kb); }

    function renderKbDocs(kb) {
        var el = document.getElementById('kbDocList');
        var pgEl = document.getElementById('kbDocPagination');
        if (!el) return;
        var kw = (document.getElementById('kbDocSearch') ? document.getElementById('kbDocSearch').value : '').toLowerCase().trim();
        var filtered = kb.docs.filter(function(d) { return !kw || d.name.toLowerCase().includes(kw); });
        if (filtered.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;">' + (kw ? '找不到符合的文件' : '尚未上傳任何文件') + '</div>';
            if (pgEl) pgEl.innerHTML = '';
            return;
        }
        var totalPages = Math.ceil(filtered.length / KB_DOC_PAGE_SIZE);
        if (kbDocPage > totalPages) kbDocPage = totalPages;
        var start = (kbDocPage-1)*KB_DOC_PAGE_SIZE;
        var pageItems = filtered.slice(start, start+KB_DOC_PAGE_SIZE);
        el.innerHTML = '<table style="table-layout:fixed;"><thead><tr><th style="width:auto;">檔案名稱</th><th style="width:90px;">大小</th><th style="width:110px;">上傳日期</th><th style="width:160px;">執行動作</th></tr></thead><tbody>' +
            pageItems.map(function(d) {
                var nameHtml = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + d.name;
                if (d.processing) nameHtml += ' <span style="font-size:11px;color:#f59e0b;font-weight:600;">⟳ 處理中...</span>';
                var actions = d.processing
                    ? '<td style="color:#94a3b8;font-size:12px;">處理中，請稍候</td>'
                    : '<td><label style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;font-weight:600;color:#334155;cursor:pointer;background:white;margin-right:6px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>更新<input type="file" style="display:none;" onchange="updateKbDoc(\''+d.id+'\',this)"></label><button class="btn btn-outline" style="padding:3px 8px;font-size:12px;color:#ef4444;border-color:#fca5a5;" onclick="removeKbDoc(\''+d.id+'\')">刪除</button></td>';
                return '<tr><td style="font-weight:600;">'+nameHtml+'</td><td>'+d.size+'</td><td>'+d.uploadDate+'</td>'+actions+'</tr>';
            }).join('') + '</tbody></table>';
        if (pgEl) {
            if (totalPages <= 1) { pgEl.innerHTML = ''; return; }
            pgEl.innerHTML = '';
            for (var i=1;i<=totalPages;i++) {
                var btn = document.createElement('button');
                btn.textContent = i;
                btn.className = 'page-btn' + (i===kbDocPage?' active':'');
                btn.onclick = (function(pg){ return function(){ kbDocPage=pg; renderKbDocs(kb); }; })(i);
                pgEl.appendChild(btn);
            }
        }
    }

    function mockUploadKbDoc(input) {
        if (!input.files||!input.files.length) return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var f=input.files[0];
        var doc={id:'d'+Date.now(),name:f.name,size:(f.size/1024).toFixed(0)+' KB',uploadDate:new Date().toISOString().slice(0,10),processing:true};
        kb.docs.push(doc); renderKbDocs(kb); input.value='';
        setTimeout(function(){doc.processing=false;renderKbDocs(kb);},1500);
    }
    function updateKbDoc(docId,input) {
        if (!input.files||!input.files.length) return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var doc=kb.docs.find(function(d){return d.id===docId;});
        if (!doc) return;
        doc.name=input.files[0].name; doc.size=(input.files[0].size/1024).toFixed(0)+' KB'; doc.uploadDate=new Date().toISOString().slice(0,10);
        renderKbDocs(kb); input.value='';
    }
    function removeKbDoc(docId) {
        if (!confirm('確定要刪除此文件？')) return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        kb.docs=kb.docs.filter(function(d){return d.id!==docId;});
        renderKbDocs(kb);
    }

    function renderKbTablesFromCurrent() { var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;}); if(kb) renderKbTables(kb); }

    function renderKbTables(kb) {
        var el = document.getElementById('kbTableList');
        if (!el) return;
        var kw = (document.getElementById('kbTableSearch') ? document.getElementById('kbTableSearch').value : '').toLowerCase().trim();
        var filtered = kb.tables.filter(function(t) { return !kw || t.name.toLowerCase().includes(kw); });
        if (filtered.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;">' + (kw?'找不到符合的資料表':'尚未建立任何資料表') + '</div>';
            return;
        }
        el.innerHTML = '<div class="card" style="padding:0;"><table><thead><tr><th>資料表名稱</th><th>來源</th><th>欄位數</th><th>資料筆數</th><th>建立日期</th><th>執行動作</th></tr></thead><tbody>' +
            filtered.map(function(t) {
                var src = t.template==='excel_import'?'Excel 匯入':t.template==='custom'?'自訂':'模板';
                return '<tr><td style="font-weight:600;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>'+t.name+'</td>' +
                    '<td>'+src+'</td><td>'+t.columns.length+'</td><td>'+t.rows.length+'</td><td>'+t.createdDate+'</td>' +
                    '<td><button class="btn btn-outline" style="padding:3px 8px;font-size:12px;" onclick="openTableDetail(\''+t.id+'\')">檢視</button> ' +
                    '<button class="btn btn-outline" style="padding:3px 8px;font-size:12px;" onclick="openEditTable(\''+t.id+'\')">編輯</button> ' +
                    '<button class="btn btn-outline" style="padding:3px 8px;font-size:12px;color:#ef4444;border-color:#fca5a5;" onclick="removeKbTable(\''+t.id+'\')">刪除</button></td></tr>';
            }).join('') + '</tbody></table></div>';
    }

    function openTableDetail(tableId) {
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t = kb.tables.find(function(x){return x.id===tableId;});
        if (!t) return;
        viewingTableId = tableId;
        kbTableDetailPage = 1;
        document.getElementById('kbTableListView').style.display = 'none';
        document.getElementById('kbTableDetailView').style.display = 'block';
        document.getElementById('kbTableDetailTitle').textContent = t.name;
        var src = t.template==='excel_import'?'Excel 匯入':t.template==='custom'?'自訂':'模板';
        document.getElementById('kbTableDetailMeta').textContent = '來源：'+src+' · '+t.columns.length+' 欄 · '+t.rows.length+' 筆 · 建立於 '+t.createdDate;
        document.getElementById('kbTableEditBtn').onclick = function(){ closeTableDetail(); openEditTable(tableId); };
        renderTableDetailContent(t);
    }

    function renderTableDetailContent(t) {
        var el = document.getElementById('kbTableDetailContent');
        var pgEl = document.getElementById('kbTableDetailPagination');
        if (!el) return;
        var totalPages = Math.max(1, Math.ceil(t.rows.length / KB_TABLE_DETAIL_PAGE_SIZE));
        if (kbTableDetailPage > totalPages) kbTableDetailPage = totalPages;
        var start = (kbTableDetailPage-1)*KB_TABLE_DETAIL_PAGE_SIZE;
        var pageRows = t.rows.slice(start, start+KB_TABLE_DETAIL_PAGE_SIZE);
        el.innerHTML = '<div style="overflow-x:auto;"><table><thead><tr>' +
            t.columns.map(function(c){return '<th style="font-size:13px;">'+c+'</th>';}).join('') +
            '<th style="font-size:13px; width:90px;">執行動作</th>' +
            '</tr></thead><tbody>' +
            (pageRows.length>0 ? pageRows.map(function(row, pageIdx){
                var realIdx = start + pageIdx;
                return '<tr>' + row.map(function(cell, colIdx){
                    return '<td style="font-size:13px; padding:0;"><input type="text" value="'+cell.replace(/"/g,'&quot;')+'" onchange="saveTableCell(\''+t.id+'\','+realIdx+','+colIdx+',this.value)" style="width:100%;border:none;padding:14px 15px;font-size:13px;font-family:inherit;outline:none;background:transparent;" onfocus="this.style.background=\'#fffbeb\';this.style.outline=\'2px solid #fcd34d\'" onblur="this.style.background=\'transparent\';this.style.outline=\'none\'">';
                }).join('') +
                '<td style="text-align:center;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="deleteTableRow(\''+t.id+'\','+realIdx+')">刪除</button></td></tr>';
            }).join('')
                : '<tr><td colspan="'+(t.columns.length+1)+'" style="text-align:center;color:#94a3b8;padding:20px;">尚無資料，請點擊「新增資料」按鈕</td></tr>') +
            '</tbody></table></div>';
        var metaEl = document.getElementById('kbTableDetailMeta');
        var src = t.template==='excel_import'?'Excel 匯入':t.template==='custom'?'自訂':'模板';
        if (metaEl) metaEl.textContent = '來源：'+src+' · '+t.columns.length+' 欄 · '+t.rows.length+' 筆 · 建立於 '+t.createdDate;
        if (pgEl) {
            if (totalPages<=1) { pgEl.innerHTML=''; return; }
            pgEl.innerHTML='';
            for (var i=1;i<=totalPages;i++) {
                var btn=document.createElement('button');
                btn.textContent=i;
                btn.className='page-btn'+(i===kbTableDetailPage?' active':'');
                btn.onclick=(function(pg){return function(){kbTableDetailPage=pg;renderTableDetailContent(t);};})(i);
                pgEl.appendChild(btn);
            }
        }
    }

    function saveTableCell(tableId, rowIdx, colIdx, value) {
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t = kb.tables.find(function(x){return x.id===tableId;});
        if (!t || !t.rows[rowIdx]) return;
        t.rows[rowIdx][colIdx] = value;
    }
    function deleteTableRow(tableId, rowIdx) {
        if (!confirm('確定要刪除此筆資料？')) return;
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t = kb.tables.find(function(x){return x.id===tableId;});
        if (!t) return;
        t.rows.splice(rowIdx, 1);
        renderTableDetailContent(t);
    }
    function addTableRow() {
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t = kb.tables.find(function(x){return x.id===viewingTableId;});
        if (!t) return;
        t.rows.push(t.columns.map(function(){return '';}));
        kbTableDetailPage = Math.ceil(t.rows.length / KB_TABLE_DETAIL_PAGE_SIZE);
        renderTableDetailContent(t);
    }
    function closeTableDetail() {
        document.getElementById('kbTableDetailView').style.display='none';
        document.getElementById('kbTableListView').style.display='block';
        viewingTableId=null;
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (kb) renderKbTables(kb);
    }

    function openEditTable(tableId) {
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t=kb.tables.find(function(x){return x.id===tableId;});
        if (!t) return;
        editingTableId=tableId;
        document.getElementById('kbTableListView').style.display='block';
        document.getElementById('kbTableDetailView').style.display='none';
        var el=document.getElementById('kbTableList');
        var editHtml='<div id="tableEditArea" class="card" style="border:2px solid #2e3f6e;margin-bottom:14px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><span style="font-size:15px;font-weight:700;color:#2e3f6e;">編輯資料表</span>' +
            '<button class="btn btn-outline" onclick="cancelEditTable()" style="font-size:12px;padding:4px 10px;">取消</button></div>' +
            '<div class="input-group" style="margin-bottom:12px;"><label style="font-size:13px;font-weight:600;">資料表名稱</label>' +
            '<input type="text" id="editTableName" value="'+t.name+'" style="margin-top:4px;"></div>' +
            '<div style="margin-bottom:12px;"><label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">欄位定義</label>' +
            '<div id="editColumnsArea" style="display:flex;flex-direction:column;gap:6px;">' +
            t.columns.map(function(c){return '<div style="display:flex;align-items:center;gap:8px;"><input type="text" class="edit-col-input" value="'+c+'" style="flex:1;padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;outline:none;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button></div>';}).join('') +
            '</div><button class="btn btn-outline" onclick="addEditColumn()" style="margin-top:8px;font-size:12px;padding:4px 10px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增欄位</button></div>' +
            '<div style="text-align:right;"><button class="btn btn-primary" onclick="saveEditTable()">儲存變更</button></div></div>';
        el.insertAdjacentHTML('afterbegin',editHtml);
    }
    function addEditColumn() {
        var a=document.getElementById('editColumnsArea');
        if (!a) return;
        a.insertAdjacentHTML('beforeend','<div style="display:flex;align-items:center;gap:8px;"><input type="text" class="edit-col-input" value="新欄位" style="flex:1;padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;outline:none;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button></div>');
    }
    function saveEditTable() {
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var t=kb.tables.find(function(x){return x.id===editingTableId;});
        if (!t) return;
        var n=document.getElementById('editTableName').value.trim();
        if (!n) {alert('請輸入資料表名稱');return;}
        t.name=n;
        var cols=Array.from(document.querySelectorAll('.edit-col-input')).map(function(i){return i.value.trim()||'未命名';});
        t.rows=t.rows.map(function(r){var nr=[];for(var i=0;i<cols.length;i++)nr.push(i<r.length?r[i]:'');return nr;});
        t.columns=cols; editingTableId=null;
        renderKbTables(kb);
    }
    function cancelEditTable() {editingTableId=null;var a=document.getElementById('tableEditArea');if(a)a.remove();}
    function removeKbTable(tableId) {
        if (!confirm('確定要刪除此資料表？')) return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        kb.tables=kb.tables.filter(function(t){return t.id!==tableId;});
        renderKbTables(kb);
    }

    function openCustomTableCreate() {
        document.getElementById('customTableName').value = '';
        document.getElementById('customTableColumns').innerHTML =
            '<div style="display:flex;align-items:center;gap:8px;"><input type="text" class="custom-col-input" value="欄位 1" style="flex:1;padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;outline:none;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button></div>' +
            '<div style="display:flex;align-items:center;gap:8px;"><input type="text" class="custom-col-input" value="欄位 2" style="flex:1;padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;outline:none;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button></div>';
        document.getElementById('customTableModal').style.display = 'flex';
    }
    function addCustomTableCol() {
        var area = document.getElementById('customTableColumns');
        if (!area) return;
        var n = area.children.length + 1;
        area.insertAdjacentHTML('beforeend', '<div style="display:flex;align-items:center;gap:8px;"><input type="text" class="custom-col-input" value="欄位 '+n+'" style="flex:1;padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;outline:none;"><button class="btn btn-outline" style="padding:2px 6px;font-size:11px;color:#ef4444;border-color:#fca5a5;" onclick="this.parentElement.remove()">✕</button></div>');
    }
    function createCustomTable() {
        var name = document.getElementById('customTableName').value.trim();
        if (!name) { alert('請輸入資料表名稱'); return; }
        var cols = Array.from(document.querySelectorAll('.custom-col-input')).map(function(i){ return i.value.trim() || '未命名'; });
        if (cols.length === 0) { alert('請至少新增一個欄位'); return; }
        var kb = allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        kb.tables.push({ id:'t'+Date.now(), name:name, template:'custom', createdDate:new Date().toISOString().slice(0,10), columns:cols, rows:[] });
        closeModal('customTableModal'); renderKbTables(kb);
    }

    function openStructuredTemplateModal() { document.getElementById('structuredTemplateModal').style.display='flex'; }
    function createFromTemplate() {
        var sel=document.querySelector('input[name="tpl"]:checked');
        if (!sel) return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if (!kb) return;
        var defs={asset:{name:'設備資產表',columns:['設備名稱','IP 位址','MAC 位址','作業系統','負責人','位置','備註']},account_perm:{name:'帳號權限矩陣',columns:['帳號名稱','所屬部門','權限等級','系統存取範圍','最後登入時間','狀態']}};
        var d=defs[sel.value]; if(!d)return;
        kb.tables.push({id:'t'+Date.now(),name:d.name,template:sel.value,createdDate:new Date().toISOString().slice(0,10),columns:d.columns,rows:[]});
        closeModal('structuredTemplateModal'); renderKbTables(kb); switchKbTab('tables');
    }
    function mockUploadKbExcel(input) {
        if (!input.files||!input.files.length) return;
        var f=input.files[0];
        var cols=f.name.toLowerCase().includes('設備')||f.name.toLowerCase().includes('asset')?['設備名稱','IP 位址','MAC 位址','作業系統','負責人','位置']:['欄位A','欄位B','欄位C','欄位D','欄位E'];
        pendingExcelData={fileName:f.name,columns:cols};
        document.getElementById('excelFieldPreview').innerHTML='<table><thead><tr>'+cols.map(function(c){return '<th style="font-size:13px;">'+c+'</th>';}).join('')+'</tr></thead><tbody><tr>'+cols.map(function(){return '<td style="font-size:12px;color:#94a3b8;">（資料預覽）</td>';}).join('')+'</tr></tbody></table>';
        document.getElementById('excelConfirmModal').style.display='flex'; input.value='';
    }
    function confirmExcelImport() {
        if(!pendingExcelData)return;
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if(!kb)return;
        kb.tables.push({id:'t'+Date.now(),name:pendingExcelData.fileName.replace(/\.(xlsx|xls|csv)$/i,''),template:'excel_import',createdDate:new Date().toISOString().slice(0,10),columns:pendingExcelData.columns,rows:[]});
        closeModal('excelConfirmModal'); pendingExcelData=null; renderKbTables(kb); switchKbTab('tables');
    }

    function renderKbAccess(kb) {
        var el=document.getElementById('kbAccessRoleChecks'); if(!el)return;
        el.innerHTML=allRoles.map(function(r){
            var ck=(kb.accessRoles||[]).includes(r.name);
            return '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;background:white;border:1px solid #e2e8f0;"><input type="checkbox" class="kb-access-check" value="'+r.name+'"'+(ck?' checked':'')+' style="width:16px;height:16px;accent-color:#2e3f6e;"><div><div style="font-size:14px;font-weight:600;color:#1e293b;">'+r.name+'</div><div style="font-size:11px;color:#94a3b8;">AI 夥伴存取：'+(r.partners||[]).join('、')+'</div></div></label>';
        }).join('');
    }
    function saveKbAccess() {
        var kb=allKnowledgeBases.find(function(k){return k.id===currentKbId;});
        if(!kb)return;
        kb.accessRoles=Array.from(document.querySelectorAll('.kb-access-check:checked')).map(function(cb){return cb.value;});
        alert('存取設定已儲存');
    }

    function openKbCreate() { document.getElementById('kbListView').style.display='none'; document.getElementById('kbCreateForm').style.display='block'; document.getElementById('pageTitle').innerText='新增知識庫'; document.getElementById('kbNewName').value=''; document.getElementById('kbNewDesc').value=''; }
    function closeKbCreate() { document.getElementById('kbCreateForm').style.display='none'; document.getElementById('kbListView').style.display='block'; document.getElementById('pageTitle').innerText='知識庫'; }
    function createKb() { var n=document.getElementById('kbNewName').value.trim(); var d=document.getElementById('kbNewDesc').value.trim(); if(!n){alert('請輸入知識庫名稱');return;} allKnowledgeBases.push({id:Date.now(),name:n,desc:d||'（未填寫說明）',accessRoles:['管理員'],docs:[],tables:[]}); closeKbCreate(); renderKbCards(); }

    document.addEventListener('DOMContentLoaded', function() { renderKbCards(); });
    </script>
</body>
</html>
