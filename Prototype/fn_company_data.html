<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP-Box — 公司資料</title>
    <link rel="stylesheet" href="_style.css">
    <style>
        #cdContent {
            width: 100%;
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
        }
        .cd-content-list { margin: 0; padding-left: 20px; }
        .cd-content-list li { margin-bottom: 4px; line-height: 1.6; }
    </style>
</head>
<body data-page="fn_company_data">
    <div id="appContainer" class="app-container" style="display:grid;">
        <!-- sidebar + header 由 _nav.js 注入 -->
        <div class="main-content">
            <div class="card filter-bar">
                <div class="filter-group">
                    <label>關鍵字:</label>
                    <input type="text" id="filterKeyword" oninput="renderCompanyDataTable()" placeholder="搜尋資料名稱或內容...">
                </div>
                <button class="btn btn-primary" style="margin-left:auto" onclick="openCompanyDataModal()">新增資料</button>
            </div>
            <div class="card" style="padding:0;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:180px;">資料名稱</th>
                            <th>內容</th>
                            <th style="width:160px;">適用夥伴</th>
                            <th style="width:140px;">執行動作</th>
                        </tr>
                    </thead>
                    <tbody id="companyDataTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 新增 / 編輯 modal -->
    <div id="companyDataModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:600px;">
            <h3 id="companyDataModalTitle" style="color:#1e293b; margin-bottom:14px;">新增資料</h3>
            <div class="input-group">
                <label>資料名稱</label>
                <input type="text" id="cdName" placeholder="例：公司網段、白名單、公司處置方法">
            </div>
            <div class="input-group">
                <label>內容</label>
                <textarea id="cdContent" placeholder="一行一條規則（空行會被忽略），例如：&#10;DMZ 對外服務固定為 192.168.10.30 (Web)&#10;svc_backup 每日 02:00 大量 IO 是正常備份"></textarea>
            </div>
            <div class="input-group" style="margin-bottom:0;">
                <label>適用夥伴</label>
                <div id="cdPartnerChecks" style="display:flex; flex-direction:column; gap:8px; margin-top:6px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeCompanyDataModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCompanyData()">儲存</button>
            </div>
        </div>
    </div>

    <script src="_mockdata.js"></script>
    <script src="_state.js"></script>
    <script src="_nav.js"></script>
    <script>
    let editingId = null;

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function(c){
            return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
    }

    function contentToBullets(content) {
        var lines = (content || '').split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
        return lines;
    }

    function renderCompanyDataTable() {
        var kw = (document.getElementById('filterKeyword').value || '').toLowerCase().trim();
        var rows = allCompanyData.filter(function(d){
            return !kw
                || (d.name || '').toLowerCase().indexOf(kw) !== -1
                || (d.content || '').toLowerCase().indexOf(kw) !== -1;
        });
        var tbody = document.getElementById('companyDataTableBody');
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:#94a3b8;">沒有符合條件的資料</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(function(d){
            var partners = Array.isArray(d.partners) ? d.partners : [];
            var partnersHtml = partners.length > 0
                ? partners.map(escapeHtml).join('、')
                : '<span style="color:#94a3b8;">未綁定</span>';
            var bullets = contentToBullets(d.content);
            var contentHtml = bullets.length > 0
                ? '<ul class="cd-content-list">' + bullets.map(function(l){
                    return '<li>' + escapeHtml(l) + '</li>';
                  }).join('') + '</ul>'
                : '<span style="color:#94a3b8;">（無內容）</span>';
            return '<tr>' +
                '<td><span style="font-weight:600;color:#1e293b;">' + escapeHtml(d.name || '') + '</span></td>' +
                '<td>' + contentHtml + '</td>' +
                '<td style="font-size:13px;color:#334155;">' + partnersHtml + '</td>' +
                '<td>' +
                    '<button class="btn btn-outline" style="padding:4px 8px;" onclick="prepareEditCompanyData(' + d.id + ')">修改</button> ' +
                    '<button class="btn btn-outline" style="padding:4px 8px; color:#ef4444; border-color:#fca5a5;" onclick="deleteCompanyData(' + d.id + ')">刪除</button>' +
                '</td></tr>';
        }).join('');
    }

    function renderPartnerChecks(currentPartners) {
        var box = document.getElementById('cdPartnerChecks');
        var bound = currentPartners || [];
        box.innerHTML = allPartners.map(function(p){
            var checked = bound.indexOf(p.name) !== -1 ? 'checked' : '';
            return '<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-weight:400;">' +
                '<input type="checkbox" data-partner="' + escapeHtml(p.name) + '" ' + checked + '>' +
                '<span><strong style="color:#1e293b;">' + escapeHtml(p.name) + '</strong>' +
                '<small style="display:block;color:#64748b;font-size:11px;">' + escapeHtml(p.desc || '') + '</small></span>' +
                '</label>';
        }).join('');
    }

    function openCompanyDataModal() {
        editingId = null;
        document.getElementById('companyDataModalTitle').textContent = '新增資料';
        document.getElementById('cdName').value = '';
        document.getElementById('cdContent').value = '';
        renderPartnerChecks([]);
        document.getElementById('companyDataModal').style.display = 'flex';
    }

    function prepareEditCompanyData(id) {
        var d = allCompanyData.find(function(x){ return x.id === id; });
        if (!d) return;
        editingId = id;
        document.getElementById('companyDataModalTitle').textContent = '編輯資料';
        document.getElementById('cdName').value = d.name || '';
        document.getElementById('cdContent').value = d.content || '';
        renderPartnerChecks(d.partners || []);
        document.getElementById('companyDataModal').style.display = 'flex';
    }

    function closeCompanyDataModal() {
        editingId = null;
        document.getElementById('companyDataModal').style.display = 'none';
    }

    function saveCompanyData() {
        var name = document.getElementById('cdName').value.trim();
        var content = document.getElementById('cdContent').value.trim();
        if (!name || !content) { alert('請填寫資料名稱與內容'); return; }

        var partnersToBind = Array.prototype.filter.call(
            document.querySelectorAll('#cdPartnerChecks input[type=checkbox]'),
            function(c){ return c.checked; }
        ).map(function(c){ return c.dataset.partner; });

        if (editingId == null) {
            var newId = allCompanyData.length === 0
                ? 1
                : Math.max.apply(null, allCompanyData.map(function(d){ return d.id; })) + 1;
            allCompanyData.push({ id: newId, name: name, content: content, partners: partnersToBind });
        } else {
            var d = allCompanyData.find(function(x){ return x.id === editingId; });
            if (d) {
                d.name = name;
                d.content = content;
                d.partners = partnersToBind;
            }
        }

        closeCompanyDataModal();
        renderCompanyDataTable();
        alert('✅ 已儲存');
    }

    function deleteCompanyData(id) {
        var d = allCompanyData.find(function(x){ return x.id === id; });
        if (!d) return;
        if (!confirm('確定要刪除「' + (d.name || '') + '」這筆資料？')) return;
        allCompanyData = allCompanyData.filter(function(x){ return x.id !== id; });
        renderCompanyDataTable();
    }

    document.addEventListener('DOMContentLoaded', function(){
        renderCompanyDataTable();
    });
    </script>
</body>
</html>
